<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 추천 서비스 플로우차트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @font-face { font-family:'KoPub'; src:local('KoPubWorld돋움체 Bold'),local('KoPubWorldDotum Bold'); font-weight:700; }
  @font-face { font-family:'KoPub'; src:local('KoPubWorld돋움체 Medium'),local('KoPubWorldDotum Medium'); font-weight:500; }
  @font-face { font-family:'KoPub'; src:local('KoPubWorld돋움체 Light'),local('KoPubWorldDotum Light'); font-weight:300; }
  body {
    font-family: 'KoPub', 'Noto Sans KR', '맑은 고딕', sans-serif;
    background: #F0F2F5;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 24px 60px;
  }
  .card {
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 2px 20px rgba(0,32,105,.10);
    padding: 44px 52px;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="card">

<!-- =====================================================
     AI 추천 서비스 수직 플로우차트
     디자인 시스템 v0.2 토큰 기준
     --blue-900:#002069 / --blue-700:#285F80
     --blue-500:#37A0E9 / --blue-200:#DADEE4
     --gray-700:#4F5B70 / KoPub + Noto Sans KR
===================================================== -->
<svg width="470" height="822" viewBox="0 0 470 822"
     xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- 화살표 마커: 짙은 회색 (#4F5B70) -->
  <marker id="arr" markerWidth="7" markerHeight="6"
          refX="6" refY="3" orient="auto">
    <polygon points="0,0 0,6 6,3" fill="#4F5B70"/>
  </marker>
</defs>

<!-- 배경: 흰색, 격자 없음 -->
<rect width="470" height="822" fill="#ffffff"/>

<!-- ═══════════════════════════════════════
     NODE 1: 외부 API 연계
     rect: x=100, y=30, w=180, h=95
════════════════════════════════════════ -->
<rect x="100" y="30" width="180" height="95"
      fill="#ffffff" stroke="#DADEE4" stroke-width="1" rx="3"/>
<text x="114" y="50"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">외부 API 연계</text>
<text x="114" y="68"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 데이터 수집/조회</text>
<text x="124" y="83"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 인증·권한</text>
<text x="124" y="98"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 에러/재시도</text>

<!-- 화살표 1 → 2 (40px 간격) -->
<line x1="190" y1="125" x2="190" y2="165"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 2: 다이아몬드 — API 응답 정상?
     center (190, 197), half-w=55, half-h=32
════════════════════════════════════════ -->
<polygon points="190,165 245,197 190,229 135,197" fill="#37A0E9"/>
<text x="190" y="201"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="12" font-weight="700" fill="#ffffff"
      text-anchor="middle">API 응답 정상?</text>

<!-- YES 라벨 + 하향 화살표 -->
<text x="175" y="244"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="10" fill="#4F5B70">YES</text>
<line x1="190" y1="229" x2="190" y2="269"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- NO 라벨 + 우향 화살표 -->
<text x="249" y="194"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="10" fill="#4F5B70">NO</text>
<line x1="245" y1="197" x2="309" y2="197"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 2-B: Fallback / 기본 추천 (우측 파란 박스)
     rect: x=311, y=165, w=140, h=60
════════════════════════════════════════ -->
<rect x="311" y="165" width="140" height="60"
      fill="#285F80" rx="3"/>
<text x="381" y="189"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="12" font-weight="700" fill="#ffffff"
      text-anchor="middle">Fallback/</text>
<text x="381" y="206"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="12" font-weight="700" fill="#ffffff"
      text-anchor="middle">기본 추천</text>

<!-- Fallback → Node 4 꺾이는 화살표 (↓ 후 ←) -->
<!-- 하단 중앙(381,225) → y=452(Node4 중앙) → 우측 엣지(280,452) -->
<path d="M 381 225 L 381 452 L 280 452"
      fill="none" stroke="#4F5B70" stroke-width="1"
      marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 3: 접근성 재정렬
     rect: x=100, y=269, w=180, h=95
════════════════════════════════════════ -->
<rect x="100" y="269" width="180" height="95"
      fill="#ffffff" stroke="#DADEE4" stroke-width="1" rx="3"/>
<text x="114" y="289"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">접근성 재정렬</text>
<text x="114" y="307"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 사용자 컨텍스트</text>
<text x="124" y="322"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 가중치/룰</text>
<text x="124" y="337"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 필터링</text>

<!-- 화살표 3 → 4 -->
<line x1="190" y1="364" x2="190" y2="404"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 4: 추천 결과
     rect: x=100, y=404, w=180, h=95
     Fallback 화살표가 우측(x=280)에서 합류
════════════════════════════════════════ -->
<rect x="100" y="404" width="180" height="95"
      fill="#ffffff" stroke="#DADEE4" stroke-width="1" rx="3"/>
<text x="114" y="424"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">추천 결과</text>
<text x="114" y="442"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· Top-N</text>
<text x="114" y="457"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 설명(Reason)</text>
<text x="114" y="472"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 로그/모니터링</text>

<!-- 화살표 4 → 5 -->
<line x1="190" y1="499" x2="190" y2="539"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 5: 웹뷰어 연결
     rect: x=100, y=539, w=180, h=95
════════════════════════════════════════ -->
<rect x="100" y="539" width="180" height="95"
      fill="#ffffff" stroke="#DADEE4" stroke-width="1" rx="3"/>
<text x="114" y="559"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">웹뷰어 연결</text>
<text x="114" y="577"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 딥링크/URL</text>
<text x="114" y="592"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 세션 전달</text>
<text x="114" y="607"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="11" fill="#4F5B70">· 추적 파라미터</text>

<!-- 화살표 5 → 6 -->
<line x1="190" y1="634" x2="190" y2="674"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 6: 결과 UI 렌더링
     rect: x=100, y=674, w=180, h=40
════════════════════════════════════════ -->
<rect x="100" y="674" width="180" height="40"
      fill="#ffffff" stroke="#DADEE4" stroke-width="1" rx="3"/>
<text x="114" y="699"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">결과 UI 렌더링</text>

<!-- 화살표 6 → 7 -->
<line x1="190" y1="714" x2="190" y2="754"
      stroke="#4F5B70" stroke-width="1" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════
     NODE 7: 비식별 정보 변환 후 DB 적재
     rect: x=100, y=754, w=180, h=52
════════════════════════════════════════ -->
<rect x="100" y="754" width="180" height="52"
      fill="#ffffff" stroke="#DADEE4" stroke-width="1" rx="3"/>
<text x="114" y="774"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">비식별 정보 변환 후</text>
<text x="114" y="791"
      font-family="'KoPub','Noto Sans KR',sans-serif"
      font-size="13" font-weight="700" fill="#002069">DB에 적재</text>

</svg>
</div>
</body>
</html>
